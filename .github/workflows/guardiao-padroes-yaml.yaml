name: Guardião de Padrões

on:
  workflow_dispatch:
    inputs:
      arquivo_para_validar:
        description: 'Caminho do arquivo YAML a validar (.yml ou .yaml)'
        required: true
        type: string

jobs:
  validar_padroes:
    name: Validar Padrões de Workflow
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v6

      - name: Validar anatomia do arquivo YAML
n        env:
          ARQUIVO_ALVO: ${{ inputs.arquivo_para_validar }}
        run: |
          set -e

          echo "Arquivo informado: $ARQUIVO_ALVO"

          # Normaliza o caminho informado e remove eventuais extensões duplicadas
          base_path="${ARQUIVO_ALVO%.*}"

          # Busca o arquivo independentemente da extensão (.yml ou .yaml)
          arquivo_encontrado=""
          for ext in "yml" "yaml"; do
            candidato="${base_path}.${ext}"
            if [ -f "$candidato" ]; then
              arquivo_encontrado="$candidato"
              break
            fi
          done

          if [ -z "$arquivo_encontrado" ]; then
            echo "❌ Arquivo não encontrado: $ARQUIVO_ALVO (.yml ou .yaml)"
            exit 1
          fi

          echo "✅ Arquivo encontrado: $arquivo_encontrado"

          # Validação de anatomia do GitHub Actions Workflow
          erros=0

          if ! grep -Eq '^name:' "$arquivo_encontrado"; then
            echo "❌ Campo obrigatório ausente: name"
            erros=$((erros + 1))
          fi

          if ! grep -Eq '^on:' "$arquivo_encontrado"; then
            echo "❌ Campo obrigatório ausente: on"
            erros=$((erros + 1))
          fi

          if ! grep -Eq '^jobs:' "$arquivo_encontrado"; then
            echo "❌ Campo obrigatório ausente: jobs"
            erros=$((erros + 1))
          fi

          if ! grep -Eq 'runs-on:' "$arquivo_encontrado"; then
            echo "❌ Campo obrigatório ausente: runs-on"
            erros=$((erros + 1))
          fi

          if ! grep -Eq 'steps:' "$arquivo_encontrado"; then
            echo "❌ Campo obrigatório ausente: steps"
            erros=$((erros + 1))
          fi

          if [ "$erros" -gt 0 ]; then
            echo "❌ Validação falhou com $erros erro(s)."
            exit 1
          fi

          echo "🎉 Anatomia válida! O arquivo segue os padrões esperados."